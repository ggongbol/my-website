<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제빵일기 🍞 (Google Sheets 연동)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-amber-50 text-amber-900 antialiased pb-12">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ⚠️ [필수] 1단계에서 배포한 구글 Apps Script의 웹 앱 URL을 여기에 붙여넣으세요!
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxMtqg2LV7Hqfle1xm_wP7LsO0enOKpN9wLZcii0yXyz90gn93EUvG9ZAs3FYX7-q5l/exec";

        function App() {
            const [diaries, setDiaries] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            
            const [breadType, setBreadType] = useState("");
            const [ingredients, setIngredients] = useState([{ name: "", amount: "" }]);
            const [recipe, setRecipe] = useState(""); 
            const [selectedDiary, setSelectedDiary] = useState(null);

            // ⚠️ 구글 시트에서 데이터 불러오기 (Read)
            const fetchDiaries = async () => {
                if (SHEET_API_URL.startsWith("YOUR_")) return;
                setIsLoading(true);
                try {
                    const response = await fetch(SHEET_API_URL);
                    const data = await response.json();
                    setDiaries(data);
                } catch (error) {
                    console.error("데이터 로딩 실패:", error);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchDiaries();
            }, []);

            const handleAddIngredient = () => {
                setIngredients([...ingredients, { name: "", amount: "" }]);
            };

            const handleIngredientChange = (index, field, value) => {
                const newIngredients = [...ingredients];
                newIngredients[index][field] = value;
                setIngredients(newIngredients);
            };

            // ⚠️ 구글 시트에 새 일기 저장하기 (Create)
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!breadType.trim()) return alert("빵 종류를 입력해주세요!");
                if (SHEET_API_URL.startsWith("YOUR_")) return alert("구글 API URL을 먼저 설정해주세요!");

                setIsLoading(true);
                const newDiary = {
                    id: String(Date.now()),
                    date: new Date().toLocaleDateString("ko-KR", {
                        year: "numeric",
                        month: "long",
                        day: "numeric",
                    }),
                    breadType,
                    ingredients: ingredients.filter((ing) => ing.name && ing.amount),
                    recipe
                };

                try {
                    // 구글 앱스 스크립트로 POST 요청 전송
                    await fetch(SHEET_API_URL, {
                        method: "POST",
                        mode: "no-cors", // 구글 리다이렉트 우회를 위해 no-cors 설정
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(newDiary)
                    });

                    // 폼 초기화 및 새로고침
                    setBreadType("");
                    setIngredients([{ name: "", amount: "" }]);
                    setRecipe(""); 
                    alert("구글 스프레드시트에 일기가 저장되었습니다! 📝");
                    
                    // 약간의 시차를 두고 새로고침 유도 (구글 서버 반영 시간 고려)
                    setTimeout(() => {
                        fetchDiaries();
                    }, 1000);

                } catch (error) {
                    console.error("저장 실패:", error);
                    alert("저장에 실패했습니다.");
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-amber-700 text-white text-center py-4 sticky top-0 shadow-md z-10">
                        <h1 className="text-xl font-bold tracking-wider">🍞 오늘의 제빵일기 (Google Sheets)</h1>
                        {isLoading && <span className="text-xs bg-amber-900 px-2 py-0.5 rounded-full animate-pulse">동기화 중...</span>}
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {/* 1. 일기 작성 폼 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-amber-100">
                            <h2 className="text-lg font-bold mb-4">✍️ 새 일기 쓰기</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold mb-1">빵 종류</label>
                                    <input
                                        type="text"
                                        value={breadType}
                                        onChange={(e) => setBreadType(e.target.value)}
                                        placeholder="예: 소금빵, 식빵"
                                        className="w-full px-3 py-2 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">재료 및 용량</label>
                                    <div className="space-y-2">
                                        {ingredients.map((ingredient, index) => (
                                            <div key={index} className="flex gap-2">
                                                <input
                                                    type="text"
                                                    placeholder="재료 (예: 강력분)"
                                                    value={ingredient.name}
                                                    onChange={(e) => handleIngredientChange(index, "name", e.target.value)}
                                                    className="w-1/2 px-3 py-2 border border-amber-200 rounded-xl text-sm"
                                                />
                                                <input
                                                    type="text"
                                                    placeholder="용량 (예: 250g)"
                                                    value={ingredient.amount}
                                                    onChange={(e) => handleIngredientChange(index, "amount", e.target.value)}
                                                    className="w-1/2 px-3 py-2 border border-amber-200 rounded-xl text-sm"
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    <button
                                        type="button"
                                        onClick={handleAddIngredient}
                                        className="mt-2 text-xs font-semibold text-amber-700 bg-amber-100 px-3 py-1.5 rounded-lg"
                                    >
                                        + 재료 추가
                                    </button>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">레시피 노트</label>
                                    <textarea
                                        value={recipe}
                                        onChange={(e) => setRecipe(e.target.value)}
                                        placeholder="만드는 순서를 적어보세요."
                                        rows="4"
                                        className="w-full px-3 py-2 border border-amber-200 rounded-xl text-sm resize-none"
                                    ></textarea>
                                </div>

                                <button
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full bg-amber-600 text-white font-bold py-3 rounded-xl shadow-md disabled:bg-amber-400"
                                >
                                    {isLoading ? "구글로 굽는 중..." : "기록하기"}
                                </button>
                            </form>
                        </section>

                        {/* 2. 수동 새로고침 버튼 및 목록 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-amber-100">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-lg font-bold">📜 지난 제빵 기록</h2>
                                <button 
                                    onClick={fetchDiaries} 
                                    className="text-xs bg-amber-100 text-amber-800 px-2.5 py-1 rounded-lg font-semibold"
                                >
                                    🔄 동기화
                                </button>
                            </div>
                            {diaries.length === 0 ? (
                                <p className="text-sm text-gray-400 text-center py-6">작성된 일기가 없거나 불러오는 중입니다.</p>
                            ) : (
                                <div className="flex flex-wrap gap-2">
                                    {diaries.map((diary) => (
                                        <div 
                                            key={diary.id}
                                            onClick={() => setSelectedDiary(diary)}
                                            className={`px-3 py-2 rounded-xl text-sm font-medium border cursor-pointer ${
                                                selectedDiary?.id === diary.id ? "bg-amber-700 text-white" : "bg-amber-50 text-amber-800"
                                            }`}
                                        >
                                            {diary.breadType}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>

                        {/* 3. 상세보기 */}
                        {selectedDiary && (
                            <section className="bg-amber-100/60 p-5 rounded-2xl border border-amber-200 space-y-4">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <span className="text-xs text-amber-700">{selectedDiary.date}</span>
                                        <h3 className="text-xl font-bold text-amber-900">{selectedDiary.breadType}</h3>
                                    </div>
                                    <button onClick={() => setSelectedDiary(null)} className="text-sm text-amber-700 font-bold">닫기</button>
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-amber-800 mb-1">재료</h4>
                                    <ul className="bg-white rounded-xl p-3 text-sm space-y-1">
                                        {selectedDiary.ingredients.map((ing, idx) => (
                                            <li key={idx} className="flex justify-between">
                                                <span>{ing.name}</span><strong>{ing.amount}</strong>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-amber-800 mb-1">레시피</h4>
                                    <div className="bg-white rounded-xl p-3 text-sm whitespace-pre-wrap">{selectedDiary.recipe}</div>
                                </div>
                            </section>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
